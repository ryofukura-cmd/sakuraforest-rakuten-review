name: 楽天レビューチェッカー

on:
  schedule:
    # 毎朝9:00 JST（= UTC 0:00）に1回実行
    - cron: '0 0 * * *'
  workflow_dispatch:  # 手動実行ボタン

env:
  SPREADSHEET_ID: '18htlkdwHKncu8zKgtytQVGqm2SHdSteqI25cFTACtg8'
  CHATWORK_ROOM_ID: '436382401'

permissions:
  id-token: write
  contents: read

jobs:
  check-reviews:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Google Cloud 認証
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Pythonパッケージをインストール
        run: pip install -r requirements.txt

      - name: Playwright（Chromium）をインストール
        run: playwright install chromium --with-deps

      - name: レビューチェック実行
        env:
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
        run: python rakuten_review_checker.py

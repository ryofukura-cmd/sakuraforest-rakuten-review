name: 【楽天】日次レビューレポート

on:
  schedule:
    # 毎朝9:00 JST（= UTC 0:00）に1回実行
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SPREADSHEET_ID: '18htlkdwHKncu8zKgtytQVGqm2SHdSteqI25cFTACtg8'
  CHATWORK_ROOM_ID: '436382401'

permissions:
  id-token: write
  contents: read

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Google Cloud 認証
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Pythonパッケージをインストール
        run: pip install -r requirements.txt

      - name: 日次レビューレポート実行
        env:
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
        run: python daily_review_report.py

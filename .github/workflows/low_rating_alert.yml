name: 【楽天】低評価レビューアラート

on:
  schedule:
    - cron: '0 0-8 * * 1-5'   # 平日 9:00〜17:00 JST（UTC 0〜8時）毎時
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SPREADSHEET_ID: '18htlkdwHKncu8zKgtytQVGqm2SHdSteqI25cFTACtg8'
  CHATWORK_ROOM_ID: '436633458'
  COMPANY_NAME: 'さくらフォレスト株式会社'

permissions:
  id-token: write
  contents: read

jobs:
  low-rating-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Google Cloud 認証
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Pythonパッケージをインストール
        run: pip install -r requirements.txt

      - name: 低評価レビューアラート実行
        env:
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
        run: python low_rating_alert.py
